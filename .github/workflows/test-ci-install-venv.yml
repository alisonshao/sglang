name: Test CI Install (venv migration)

# Manual dispatch for testing ci_install_dependency.sh changes on dev runners.
# Supports H200 (1-GPU) and B200 (4-GPU) test runners.
# Note: Latest PR always creates a venv — no toggle needed.

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: "Runner label to target"
        required: true
        type: choice
        options:
          - "1-gpu-test-cu12"
          - "1-gpu-test-cu13"
          - "1-gpu-test"
          - "4-gpu-b200-test"
        default: "1-gpu-test-cu12"

jobs:
  test-install-and-run:
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 60
    env:
      SGLANG_IS_IN_CI: "true"
      # HF_TOKEN comes from the runner's .env file (set at container creation).
      # Do NOT set HF_TOKEN here via secrets — on forks, secrets are empty and
      # would override the runner's valid token with an empty string.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        timeout-minutes: 40
        run: |
          bash scripts/ci/cuda/ci_install_dependency.sh

      - name: Sanity check — torch + CUDA alignment
        run: |
          echo "=== Environment ==="
          echo "VIRTUAL_ENV=${VIRTUAL_ENV:-unset}"
          echo "python3=$(command -v python3)"
          echo
          echo "=== GPU info ==="
          python3 -c "
          import torch
          print(f'GPU count: {torch.cuda.device_count()}')
          for i in range(torch.cuda.device_count()):
              cap = torch.cuda.get_device_capability(i)
              print(f'  GPU {i}: {torch.cuda.get_device_name(i)}, SM {cap[0]}{cap[1]}')
          is_blackwell = cap[0] >= 10
          print(f'IS_BLACKWELL: {is_blackwell} (compute_cap={cap[0]}.{cap[1]})')
          "
          echo
          echo "=== Package versions ==="
          python3 -c "
          import torch, torchvision, torchaudio
          print(f'torch={torch.__version__} cuda={torch.version.cuda}')
          print(f'torchvision={torchvision.__version__}')
          print(f'torchaudio={torchaudio.__version__}')
          assert torch.cuda.is_available(), 'CUDA not available!'
          "
          echo
          echo "=== sglang import ==="
          python3 -c "import sglang; print('sglang import OK')"
          echo
          echo "=== nvrtc check ==="
          python3 -c "
          import torch
          x = torch.randn(2, 2, device='cuda')
          print('CUDA tensor OK:', x.shape)
          "
          echo
          echo "=== sgl-kernel import ==="
          python3 -c "
          try:
              import sgl_kernel
              print(f'sgl_kernel OK: {sgl_kernel.__version__}')
          except Exception as e:
              print(f'sgl_kernel import failed: {e}')
          "

      - name: Test — 1-GPU quant (test_w8a8_quantization.py)
        if: "!contains(inputs.runner_label, '4-gpu')"
        timeout-minutes: 10
        run: |
          cd test
          python3 registered/quant/test_w8a8_quantization.py

      - name: Test — 1-GPU VLM (test_vision_openai_server_a.py)
        if: "!contains(inputs.runner_label, '4-gpu')"
        timeout-minutes: 25
        run: |
          cd test
          python3 registered/vlm/test_vision_openai_server_a.py

      - name: Test — 4-GPU B200 flash attention (test_flash_attention_4.py)
        if: contains(inputs.runner_label, '4-gpu')
        timeout-minutes: 15
        run: |
          cd test
          python3 registered/attention/test_flash_attention_4.py

      - name: Test — 4-GPU B200 nvfp4 gemm (test_nvfp4_gemm.py)
        if: contains(inputs.runner_label, '4-gpu')
        timeout-minutes: 15
        run: |
          cd test
          python3 registered/quant/test_nvfp4_gemm.py

      - name: Cleanup venv
        if: always()
        run: bash scripts/ci/cuda/ci_cleanup_venv.sh
